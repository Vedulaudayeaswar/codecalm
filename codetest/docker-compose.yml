services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  kafka:
    image: apache/kafka:3.7.2
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,HOST://:29092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,HOST://localhost:29092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_NUM_PARTITIONS=3

  upload:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.upload
    ports:
      - "8081:8081"
    volumes:
      - submissions:/app/submissions
      - /var/run/docker.sock:/var/run/docker.sock

  metrics:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.metrics
    environment:
      - KAFKA_BROKERS=kafka:9092
      - REDIS_ADDR=redis:6379
    depends_on:
      - kafka
      - redis

  ws:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.ws
    ports:
      - "8084:8084"
    environment:
      - REDIS_ADDR=redis:6379
    depends_on:
      - redis

  botload:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.botload
    environment:
      - KAFKA_BROKERS=kafka:9092
      - TARGET_URL=http://host.docker.internal:8080/orders
      - BOT_COUNT=100
      - DURATION=30s
      - BOTLOAD_MODE=server
      - PORT=8082
    ports:
      - "8082:8082"
    depends_on:
      - kafka
    profiles:
      - load

volumes:
  submissions:
